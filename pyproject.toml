[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "src"
version = "0.1.0"
description = "TBD"
authors = [{ name = "Gustav" }]
license = { text = "MIT" }
requires-python = ">=3.8"
dependencies = [
  "click",
  "Sphinx",
  "coverage",
  "awscli",
  "flake8",
  "python-dotenv>=0.5.1",
  "numpy>=1.24.4",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
